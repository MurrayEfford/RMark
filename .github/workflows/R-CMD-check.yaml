name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: '${{ matrix.config.os }} (${{ matrix.config.r }}) - MARK: ${{ matrix.config.with_mark }}'

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release', with_mark: true}
          - {os: ubuntu-latest,   r: 'release', with_mark: false}
          - {os: macos-latest,    r: 'release', with_mark: true}
          - {os: macos-latest,    r: 'release', with_mark: false}
          - {os: windows-latest,  r: 'release', with_mark: true}
          - {os: windows-latest,  r: 'release', with_mark: false}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # --- STEP 1: Provision Program MARK Conditionally Across Platforms ---

      - name: Install Program MARK (Linux)
        if: runner.os == 'Linux' && matrix.config.with_mark == true
        run: |
          cd /tmp
          wget --user-agent="Mozilla/5.0" http://www.phidot.org/software/mark/downloads/files/mark.64.zip
          unzip mark.64.zip
          sudo mv mark.64/mark64-v2 /usr/local/bin/mark
          sudo chmod +x /usr/local/bin/mark

      - name: Install Program MARK (macOS)
        if: runner.os == 'macOS' && matrix.config.with_mark == true
        run: |
          brew tap sjbonner/tap
          brew install mark-on-mac
          
          # Fix the Abort trap: 6 by finding where Homebrew installed gfortran and symlinking it 
          # into a directory that macOS allows binaries to search.
          FORT_LIB=$(find /opt/homebrew /usr/local -name "libgfortran.5.dylib" 2>/dev/null | head -n 1)
          if [ -n "$FORT_LIB" ]; then
            sudo ln -sf "$FORT_LIB" /usr/local/lib/libgfortran.5.dylib
          fi

          # Tell R exactly where the executable lives via Rprofile
          R_HOME=$(R RHOME)
          echo "options(MarkPath = '/opt/homebrew/bin/')" | sudo tee -a "$R_HOME/etc/Rprofile.site"

      - name: Install Program MARK (Windows)
        if: runner.os == 'Windows' && matrix.config.with_mark == true
        shell: pwsh
        run: |
          # Using native PowerShell loops to avoid cmd/chkcmd dependency issues entirely
          Invoke-WebRequest -UserAgent "Mozilla/5.0" -Uri "http://www.phidot.org/software/mark/downloads/files/mark.64.zip" -OutFile "mark.zip"
          Expand-Archive -Path "mark.zip" -DestinationPath "mark_extracted" -Force
          New-Item -ItemType Directory -Force -Path "C:\MARK"
          Get-ChildItem -Path "mark_extracted" -Filter "mark.exe" -Recurse | Move-Item -Destination "C:\MARK\mark.exe" -Force
          
          # Write the path configuration cleanly to the global R profile
          $RHome = Rscript -e "cat(R.home())"
          Add-Content -Path "$RHome\etc\Rprofile.site" -Value "options(MarkPath = 'C:/MARK/')"

      # --- STEP 2: Resolve System and Package Dependencies ---

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: '.'

      # --- STEP 3: Execute R CMD Check Verification Pass ---

      - name: Check R Package
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: '.'