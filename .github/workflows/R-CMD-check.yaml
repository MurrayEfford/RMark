name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: '${{ matrix.config.os }} (${{ matrix.config.r }})'

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release'}
          - {os: macos-latest,    r: 'release'}
          - {os: windows-latest,  r: 'release'}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # --- STEP 1: Resolve Package Dependencies ---
      # Explicitly points to the subfolder so 'pak' can discover your DESCRIPTION file
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: 'RMark'

      # --- STEP 2: Execute R CMD Check Verification Pass ---
      # Tells rcmdcheck to look directly inside the subfolder context
      - name: Check R Package
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: 'RMark'