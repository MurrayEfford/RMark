name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (MARK=${{ matrix.config.with_mark }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # --- Linux Tests ---
          - {os: ubuntu-latest,   r: 'release', with_mark: true}
          - {os: ubuntu-latest,   r: 'release', with_mark: false}
          
          # --- Windows Tests ---
          - {os: windows-latest,  r: 'release', with_mark: true}
          - {os: windows-latest,  r: 'release', with_mark: false}
          
          # --- macOS Tests ---
          - {os: macOS-latest,    r: 'release', with_mark: true}
          - {os: macOS-latest,    r: 'release', with_mark: false}

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # --- STEP 1: Provision Program MARK Conditionally Based on Matrix Flag ---
      
      - name: Install Program MARK (Linux)
        if: runner.os == 'Linux' && matrix.config.with_mark == true
        run: |
          # Download the verified 64-bit Linux compilation tarball from the primary server root
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64)" http://www.phidot.org/software/mark/rmark/linux/mark64.tar.gz
          tar -xvzf mark64.tar.gz
          
          # Move the optimized static binary to the local path execution folder
          sudo mv mark64.static /usr/local/bin/mark
          sudo chmod +x /usr/local/bin/mark

      - name: Install Program MARK (macOS)
        if: runner.os == 'macOS' && matrix.config.with_mark == true
        run: |
          # Use Simon Bonner's official tap framework directly via Homebrew
          # This automatically resolves the path routing and links the correct gfortran/GCC libraries
          brew tap sjbonner/tap
          brew install mark-on-mac
          
          # Verify file mapping to standard path target
          sudo chmod +x /usr/local/bin/mark

      - name: Install Program MARK (Windows)
        if: runner.os == 'Windows' && matrix.config.with_mark == true
        shell: pwsh
        run: |
          # Windows remains stable on the primary download files bucket directory
          Invoke-WebRequest -UserAgent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -Uri "http://www.phidot.org/software/mark/downloads/files/mark.zip" -OutFile "mark.zip"
          Expand-Archive -Path "mark.zip" -DestinationPath "mark_extracted"
          New-Item -ItemType Directory -Force -Path "C:\Program Files\MARK"
          Move-Item -Path "mark_extracted\mark.exe" -Destination "C:\Program Files\MARK\mark.exe" -Force
          echo "C:\Program Files\MARK" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
      # --- STEP 2: Handle R Package Dependencies Located in the Subfolder ---
      
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          subdirectory: 'RMark' # <--- Instructs action to find DESCRIPTION here

      # --- STEP 3: Execute R CMD Check Inside the Subfolder ---
      
      - name: Check Package
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: 'RMark' # <--- Forces the check suite to run inside the subfolder
          args: 'c("--no-manual", "--as-cran")'