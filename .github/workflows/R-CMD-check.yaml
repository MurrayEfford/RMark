name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    # Fixed: Single quotes prevent the colon after 'MARK' from breaking the YAML parser
    name: '${{ matrix.config.os }} (${{ matrix.config.r }}) - MARK: ${{ matrix.config.with_mark }}'

    strategy:
      fail-fast: false
      matrix:
        config:
          # Complete testing matrix across all environments and configurations
          - {os: ubuntu-latest,   r: 'release', with_mark: true}
          - {os: ubuntu-latest,   r: 'release', with_mark: false}
          - {os: macos-latest,    r: 'release', with_mark: true}
          - {os: macos-latest,    r: 'release', with_mark: false}
          - {os: windows-latest,  r: 'release', with_mark: true}
          - {os: windows-latest,  r: 'release', with_mark: false}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # --- STEP 1: Provision Program MARK Conditionally Across Platforms ---

      - name: Install Program MARK (Linux)
        if: runner.os == 'Linux' && matrix.config.with_mark == true
        run: |
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64)" http://www.phidot.org/software/mark/downloads/files/mark.64.zip
          unzip mark.64.zip
          sudo mv */mark64-v2 /usr/local/bin/mark
          sudo chmod +x /usr/local/bin/mark

      - name: Install Program MARK (macOS)
        if: runner.os == 'macOS' && matrix.config.with_mark == true
        run: |
          # 1. Compile natively via Simon Bonner's Homebrew Tap
          brew tap sjbonner/tap
          brew install mark-on-mac
          
          # 2. Isolate the compiled execution path
          sudo mkdir -p /opt/mark-bin
          if [ -f /opt/homebrew/bin/mark ]; then
            sudo ln -sf /opt/homebrew/bin/mark /opt/mark-bin/mark
          else
            sudo ln -sf /usr/local/bin/mark /opt/mark-bin/mark
          fi
          sudo chmod +x /opt/mark-bin/mark

          # 3. Mount configurations inside the R base environment profile
          R_HOME=$(R RHOME)
          echo "options(MarkPath = '/opt/mark-bin/')" | sudo tee -a "$R_HOME/etc/Rprofile.site"
          echo "Sys.setenv(DYLD_LIBRARY_PATH = '/opt/homebrew/lib:/usr/local/lib')" | sudo tee -a "$R_HOME/etc/Rprofile.site"

      - name: Install Program MARK (Windows)
        if: runner.os == 'Windows' && matrix.config.with_mark == true
        shell: pwsh
        run: |
          Invoke-WebRequest -UserAgent "Mozilla/5.0" -Uri "http://www.phidot.org/software/mark/downloads/files/mark.64.zip" -OutFile "mark.64.zip"
          Expand-Archive -Path "mark.64.zip" -DestinationPath "mark_extracted"
          New-Item -ItemType Directory -Force -Path "C:\Program Files\MARK"
          Get-ChildItem -Path "mark_extracted" -Filter "mark.exe" -Recurse | Move-Item -Destination "C:\Program Files\MARK\mark.exe" -Force
          echo "C:\Program Files\MARK" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # --- STEP 2: Resolve System and Package Dependencies ---

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2

      # --- STEP 3: Execute R CMD Check Verification Pass ---

      - name: Check R Package
        uses: r-lib/actions/check-r-package@v2
        with:
          # Explicitly target the checked-out workspace directory path 
          # without breaking the native actions execution root context.
          working-directory: '${{ github.workspace }}'