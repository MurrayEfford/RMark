name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (MARK=${{ matrix.config.with_mark }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # --- Linux Tests ---
          - {os: ubuntu-latest,   r: 'release', with_mark: true}
          - {os: ubuntu-latest,   r: 'release', with_mark: false}
          
          # --- Windows Tests ---
          - {os: windows-latest,  r: 'release', with_mark: true}
          - {os: windows-latest,  r: 'release', with_mark: false}
          
          # --- macOS Tests ---
          - {os: macOS-latest,    r: 'release', with_mark: true}
          - {os: macOS-latest,    r: 'release', with_mark: false}

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # --- STEP 1: Provision Program MARK Conditionally Based on Matrix Flag ---
      
      - name: Install Program MARK (Linux)
        if: runner.os == 'Linux' && matrix.config.with_mark == true
        run: |
          # Download and extract using your verified absolute URL
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64)" http://www.phidot.org/software/mark/downloads/files/mark.64.zip
          unzip mark.64.zip
          
          # Target the file inside the extracted subfolder using a wildcard
          sudo mv */mark64-v2 /usr/local/bin/mark
          sudo chmod +x /usr/local/bin/mark

      - name: Install Program MARK (macOS)
        if: runner.os == 'macOS' && matrix.config.with_mark == true
        run: |
          # Fetch true, clean Fortran source components from the CRAN/RMark mirror tree
          curl -L -O https://raw.githubusercontent.com/jlaake/RMark/master/inst/mark.f
          curl -L -O https://raw.githubusercontent.com/jlaake/RMark/master/inst/fastam.f
          
          # Compile natively on the runner's architecture using the local gfortran compiler
          gfortran -O3 -o mark mark.f fastam.f
          
          # Move the freshly compiled binary to execution path
          sudo mv mark /usr/local/bin/mark
          sudo chmod +x /usr/local/bin/mark

      - name: Install Program MARK (Windows)
        if: runner.os == 'Windows' && matrix.config.with_mark == true
        shell: pwsh
        run: |
          # Use Chocolatey to install program MARK natively and bypass server 404 blocks completely
          choco install program-mark -y --no-progress
          
          # Force link the extracted engine into the runner's target system PATH
          echo "C:\Program Files (x86)\MARK" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
      # --- STEP 2: Handle R Package Dependencies Located in the Subfolder ---
      
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          subdirectory: 'RMark' # <--- Instructs action to find DESCRIPTION here

      # --- STEP 3: Execute R CMD Check Inside the Subfolder ---
      
      - name: Check Package
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: 'RMark' # <--- Forces the check suite to run inside the subfolder
          args: 'c("--no-manual", "--as-cran")'